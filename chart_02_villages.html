<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侨乡村落户籍与旅外人口对比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','Noto Sans SC',sans-serif;
  background:#f8f4e6;
  }
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:8px 24px 6px}
.title{width:100%;text-align:center;font-size:17px;font-weight:700;color:#4a4035;letter-spacing:1.5px;padding-top:10px;flex-shrink:0;
  border-bottom:1px solid rgba(196,154,108,0.25);padding-bottom:8px;margin-bottom:4px}
#chart{width:100%;height:320px;flex:1}
.subtitle{width:100%;text-align:center;font-size:11px;color:#9a8f82;padding-top:6px;flex-shrink:0;
  border-top:1px solid rgba(196,154,108,0.2);padding-bottom:4px}

@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.title{animation:fadeInDown 0.8s ease-out}
.subtitle{animation:fadeInUp 0.8s ease-out 0.4s both}
#chart{animation:scaleIn 1s ease-out 0.2s both}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">侨乡村落户籍与旅外人口对比</div>
  <div id="chart"></div>
  <div class="subtitle">旅外倍数 = 旅外侨胞 / 户籍人口　数据来源：各侨乡村落调研统计</div>
</div>
<script>
(function(){
  function init(){
    var dom = document.getElementById('chart');
    if(!dom || typeof echarts === 'undefined'){
      setTimeout(init, 100);
      return;
    }
    var h = dom.offsetHeight || 320;
    var w = dom.offsetWidth || 600;
    var chart = echarts.init(dom, null, {width: w, height: h});
    chart.setOption({
animation:true,
animationDuration:2200,
animationDurationUpdate:900,
animationEasing:'cubicOut',
animationEasingUpdate:'cubicInOut',
animationDelay:function(idx){return idx*120;},
animationDelayUpdate:function(idx){return idx*60;},

  tooltip:{trigger:'axis'},
  legend:{data:['户籍人口','旅外侨胞','旅外倍数'],top:'4%',textStyle:{color:'#5c5248'}},
  grid:{left:'10%',right:'12%',top:'16%',bottom:'12%'},
  xAxis:{type:'category',data:['梧林社区','和顺镇','黎塘村','前美村','鸿渐村','马湾镇','坭湾村'],axisLabel:{color:'#5c5248',fontSize:11},axisLine:{lineStyle:{color:'#d8d0c4'}}},
  yAxis:[
    {type:'value',name:'人口(人)',nameTextStyle:{color:'#5c5248'},axisLabel:{color:'#5c5248'},splitLine:{lineStyle:{color:'#ece6dc',type:'dashed'}}},
    {type:'value',name:'倍数',nameTextStyle:{color:'#6a9bd8'},axisLabel:{color:'#6a9bd8'},splitLine:{show:false}}
  ],
  series:[
    {name:'户籍人口',type:'bar',
      animationDelay:function(idx){return idx*150;},animationEasing:'elasticOut',animationDuration:1800,data:[1800,7000,2200,7000,3000,41000,125],itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'#dab5b5'},{offset:1,color:'#c49595'}]},borderRadius:[4,4,0,0]},barWidth:'25%'},
    {name:'旅外侨胞',type:'bar',
      animationDelay:function(idx){return idx*150;},animationEasing:'elasticOut',animationDuration:1800,data:[18000,30000,4000,10000,1300,34300,282],itemStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'#d4a96f'},{offset:1,color:'#b88a4e'}]},borderRadius:[4,4,0,0]},barWidth:'25%'},
    {name:'旅外倍数',type:'line',
      animationDuration:2500,animationEasing:'cubicOut',animationDelay:function(idx){return idx*100;},yAxisIndex:1,data:[10.0,4.29,1.82,1.43,0.43,0.84,2.26],itemStyle:{color:'#6a9bd8'},lineStyle:{width:3},symbol:'circle',symbolSize:8,label:{show:true,position:'top',color:'#6a9bd8',formatter:function(p){return p.value+'x';}}}
  ]

    });
    setTimeout(function(){chart.resize();}, 200);
    window.addEventListener('resize',function(){chart.resize();});
  }
  if(document.readyState === 'complete'){init();} else {window.addEventListener('load', init);}
  setTimeout(init, 500);
})();
</script>
</body>
</html>
