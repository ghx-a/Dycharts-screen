<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侨批局数量变迁</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','Noto Sans SC',sans-serif;
  background:#f8f4ec;
  background-image:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0%, transparent 60%), linear-gradient(135deg, #faf7f1 0%, #f2ece1 100%);}
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:8px 24px 6px}
.title{width:100%;text-align:center;font-size:17px;font-weight:700;color:#4a4035;letter-spacing:1.5px;padding-top:10px;flex-shrink:0;
  border-bottom:1px solid rgba(196,154,108,0.25);padding-bottom:8px;margin-bottom:4px}
.chart{width:100%;flex:1;min-height:0}
.subtitle{width:100%;text-align:center;font-size:11px;color:#9a8f82;padding-top:6px;flex-shrink:0;
  border-top:1px solid rgba(196,154,108,0.2);padding-bottom:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">侨批局数量变迁</div>
  <div class="chart" id="chart"></div>
  <div class="subtitle">厦门 8→114　汕头 12→130　来源：厦门/汕头侨务局档案</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  tooltip:{trigger:'axis'},
  legend:{data:['厦门侨批局','汕头侨批局'],top:'4%',textStyle:{color:'#5c5248'}},
  grid:{left:'10%',right:'8%',top:'16%',bottom:'12%'},
  xAxis:{type:'category',data:['1880年代','1882年','1917年','1932年','1937年','1946年'],axisLabel:{color:'#5c5248',fontSize:11},axisLine:{lineStyle:{color:'#d8d0c4'}}},
  yAxis:{type:'value',name:'家',nameTextStyle:{color:'#5c5248'},axisLabel:{color:'#5c5248'},splitLine:{lineStyle:{color:'#ece6dc',type:'dashed'}}},
  series:[
    {name:'厦门侨批局',type:'line',smooth:true,data:[8,null,null,null,114,null],lineStyle:{width:3,color:'#6a9bd8'},itemStyle:{color:'#6a9bd8',borderColor:'#fff',borderWidth:2},symbol:'circle',symbolSize:10,connectNulls:true,label:{show:true,position:'top',color:'#6a9bd8',formatter:function(p){return p.value!=null?p.value:'';}}},
    {name:'汕头侨批局',type:'line',smooth:true,data:[null,12,41,66,null,130],lineStyle:{width:3,color:'#c49a6c'},itemStyle:{color:'#c49a6c',borderColor:'#fff',borderWidth:2},symbol:'circle',symbolSize:10,connectNulls:true,label:{show:true,position:'top',color:'#c49a6c',formatter:function(p){return p.value!=null?p.value:'';}}}
  ]

};
chart.setOption(option);
window.addEventListener('resize',function(){chart.resize();});
</script>
</body>
</html>
