<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侨乡分布与华侨迁徙关键词</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts-wordcloud@2/dist/echarts-wordcloud.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','Noto Sans SC',sans-serif;
  background:#f8f4e6;
  }
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:8px 24px 6px}
.title{width:100%;text-align:center;font-size:17px;font-weight:700;color:#4a4035;letter-spacing:1.5px;padding-top:10px;flex-shrink:0;
  border-bottom:1px solid rgba(196,154,108,0.25);padding-bottom:8px;margin-bottom:4px}
#chart{width:100%;height:320px;flex:1}
.subtitle{width:100%;text-align:center;font-size:11px;color:#9a8f82;padding-top:6px;flex-shrink:0;
  border-top:1px solid rgba(196,154,108,0.2);padding-bottom:4px}

@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.title{animation:fadeInDown 0.8s ease-out}
.subtitle{animation:fadeInUp 0.8s ease-out 0.4s both}
#chart{animation:scaleIn 1s ease-out 0.2s both}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">侨乡分布与华侨迁徙关键词</div>
  <div id="chart"></div>
  <div class="subtitle">基于侨乡分布、迁徙动因、人口结构等文本整理</div>
</div>
<script>
(function(){
  function init(){
    var dom = document.getElementById('chart');
    if(!dom || typeof echarts === 'undefined'){
      setTimeout(init, 100);
      return;
    }
    var h = dom.offsetHeight || 320;
    var w = dom.offsetWidth || 600;
    var chart = echarts.init(dom, null, {width: w, height: h});

var data = [{"name": "广东", "value": 3000}, {"name": "福建", "value": 2000}, {"name": "潮汕", "value": 1500}, {"name": "泉州", "value": 948}, {"name": "梅州", "value": 500}, {"name": "江门", "value": 530}, {"name": "福州", "value": 460}, {"name": "温州", "value": 83}, {"name": "文昌", "value": 120}, {"name": "汕尾", "value": 140}, {"name": "青田", "value": 38}, {"name": "和顺", "value": 30}, {"name": "天门", "value": 28}, {"name": "海外侨胞", "value": 600}, {"name": "华侨华人", "value": 580}, {"name": "侨乡", "value": 500}, {"name": "迁徙", "value": 450}, {"name": "落叶归根", "value": 200}, {"name": "下南洋", "value": 380}, {"name": "东南亚", "value": 410}, {"name": "北美", "value": 350}, {"name": "欧洲", "value": 300}, {"name": "梧林社区", "value": 180}, {"name": "黎塘村", "value": 220}, {"name": "前美村", "value": 200}, {"name": "鸿渐村", "value": 130}, {"name": "马湾镇", "value": 410}, {"name": "坭湾村", "value": 125}, {"name": "侨眷", "value": 350}, {"name": "旅外侨胞", "value": 400}, {"name": "户籍人口", "value": 250}, {"name": "亚洲", "value": 440}, {"name": "大洋洲", "value": 115}, {"name": "拉丁美洲", "value": 150}, {"name": "非洲", "value": 150}, {"name": "美国", "value": 508}, {"name": "日本", "value": 90}, {"name": "澳大利亚", "value": 86}, {"name": "加拿大", "value": 177}, {"name": "韩国", "value": 57}, {"name": "百年增长", "value": 300}, {"name": "闽粤", "value": 280}, {"name": "广西", "value": 300}, {"name": "云南", "value": 250}, {"name": "浙江", "value": 205}, {"name": "海南", "value": 370}, {"name": "核心侨乡", "value": 350}, {"name": "侨务统计", "value": 200}, {"name": "分布报告", "value": 180}];
var colorList = ['#c49a6c','#6a9bd8','#7cb88a','#d4a5a5','#9e8cb8','#e6b563','#8ab6c9','#bc9a86','#8a9a7b','#d8b4a6','#ae9cc0','#94c4d6'];
    chart.setOption({
animation:true,
animationDuration:2200,
animationDurationUpdate:900,
animationEasing:'cubicOut',
animationEasingUpdate:'cubicInOut',
animationDelay:function(idx){return idx*120;},
animationDelayUpdate:function(idx){return idx*60;},

  tooltip:{show:true,formatter:function(p){return p.name+': '+p.value;}},
  series:[{
    type:'wordCloud',
    animationDuration:1500,animationEasing:'cubicOut',animationDelay:function(idx){return idx*30;},
    shape:'circle',
    left:'center',
    top:'center',
    width:'95%',
    height:'95%',
    sizeRange:[14,60],
    rotationRange:[-30,30],
    rotationStep:15,
    gridSize:8,
    drawOutOfBound:false,
    textStyle:{
      fontFamily:'Microsoft YaHei, Noto Sans SC, sans-serif',
      fontWeight:'bold',
      color:function(){return colorList[Math.floor(Math.random()*colorList.length)];}
    },
    emphasis:{
      focus:'self',
      textStyle:{
        shadowBlur:10,
        shadowColor:'rgba(0,0,0,0.15)'
      }
    },
    data:data
  }]
    });
    setTimeout(function(){chart.resize();}, 200);
    window.addEventListener('resize',function(){chart.resize();});
  }
  if(document.readyState === 'complete'){init();} else {window.addEventListener('load', init);}
  setTimeout(init, 500);
})();
</script>
</body>
</html>
