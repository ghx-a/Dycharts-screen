<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侨批亲属关系分布</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','Noto Sans SC',sans-serif;
  background:#f8f4ec;
  background-image:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0%, transparent 60%), linear-gradient(135deg, #faf7f1 0%, #f2ece1 100%);}
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:8px 24px 6px}
.title{width:100%;text-align:center;font-size:17px;font-weight:700;color:#4a4035;letter-spacing:1.5px;padding-top:10px;flex-shrink:0;
  border-bottom:1px solid rgba(196,154,108,0.25);padding-bottom:8px;margin-bottom:4px}
.chart{width:100%;flex:1;min-height:0}
.subtitle{width:100%;text-align:center;font-size:11px;color:#9a8f82;padding-top:6px;flex-shrink:0;
  border-top:1px solid rgba(196,154,108,0.2);padding-bottom:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">侨批亲属关系分布</div>
  <div class="chart" id="chart"></div>
  <div class="subtitle">核心圈层60%：儿子寄给母亲占比最高　来源：侨批信件抽样分析</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  tooltip:{trigger:'item',formatter:function(p){return p.name+'<br/>占比：'+p.value+'%<br/>'+p.data.desc;}},
  graphic:{type:'text',left:'center',top:'center',style:{text:'亲属\n关系',fill:'#c49a6c',fontSize:18,fontWeight:'bold',fontFamily:'Microsoft YaHei',lineHeight:22}},
  series:[{
    type:'pie',radius:['48%','76%'],
    data:[
      {value:60,name:'核心圈层',desc:'子女→父母、夫妻',itemStyle:{color:'#c49a6c'}},
      {value:25,name:'次核心圈层',desc:'兄弟姐妹、祖孙',itemStyle:{color:'#6a9bd8'}},
      {value:12,name:'边缘圈层',desc:'叔伯、姑姨、侄甥',itemStyle:{color:'#7cb88a'}},
      {value:3,name:'其他',desc:'远房姻亲、非亲属',itemStyle:{color:'#d8d0c4'}}
    ],
    label:{color:'#5c5248',fontSize:11,formatter:function(p){return p.name+'\n'+p.value+'%';}},
    labelLine:{lineStyle:{color:'#d8d0c4'}},
    itemStyle:{borderColor:'#f8f4ec',borderWidth:3},
    emphasis:{scaleSize:8,shadowColor:'rgba(0,0,0,0.12)',shadowBlur:10}
  }]

};
chart.setOption(option);
window.addEventListener('resize',function(){chart.resize();});
</script>
</body>
</html>
