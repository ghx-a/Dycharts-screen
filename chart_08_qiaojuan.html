<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侨乡村落侨眷占比</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','Noto Sans SC',sans-serif;
  background:#f8f4ec;
  background-image:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.6) 0%, transparent 60%), linear-gradient(135deg, #faf7f1 0%, #f2ece1 100%);}
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:8px 24px 6px}
.title{width:100%;text-align:center;font-size:17px;font-weight:700;color:#4a4035;letter-spacing:1.5px;padding-top:10px;flex-shrink:0;
  border-bottom:1px solid rgba(196,154,108,0.25);padding-bottom:8px;margin-bottom:4px}
.chart{width:100%;flex:1;min-height:0}
.subtitle{width:100%;text-align:center;font-size:11px;color:#9a8f82;padding-top:6px;flex-shrink:0;
  border-top:1px solid rgba(196,154,108,0.2);padding-bottom:4px}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">侨乡村落侨眷占比</div>
  <div class="chart" id="chart"></div>
  <div class="subtitle">马湾镇侨眷占比最高达83.7%　来源：各村落侨情调研</div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
var option = {
  tooltip:{trigger:'axis',axisPointer:{type:'shadow'},formatter:function(p){var v=p[0];return v.name+'<br/>侨眷占比：'+v.value+'%';}},
  grid:{left:'16%',right:'10%',top:'8%',bottom:'8%'},
  xAxis:{type:'value',max:100,axisLabel:{color:'#5c5248',formatter:'{value}%'},splitLine:{lineStyle:{color:'#ece6dc',type:'dashed'}}},
  yAxis:{type:'category',data:['马湾镇','坭湾村','黎塘村','梧林社区','前美村','和顺镇','鸿渐村'],axisLabel:{color:'#5c5248',fontSize:11},axisLine:{lineStyle:{color:'#d8d0c4'}}},
  series:[{
    type:'bar',barWidth:'55%',
    data:[83.7,44,0,0,0,0,0],
    itemStyle:{color:new echarts.graphic.LinearGradient(1,0,0,0,[{offset:0,color:'#c49a6c'},{offset:1,color:'#e0c9a8'}]),borderRadius:[0,6,6,0],shadowColor:'rgba(0,0,0,0.08)',shadowBlur:6,shadowOffsetX:3},
    label:{show:true,position:'right',color:'#5c5248',formatter:function(p){return p.value>0?p.value+'%':'';}}
  }]

};
chart.setOption(option);
window.addEventListener('resize',function(){chart.resize();});
</script>
</body>
</html>
