<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>侨汇用途分配</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%;overflow:hidden}
body{font-family:'Microsoft YaHei','Noto Sans SC',sans-serif;
  background:#f8f4e6;
  }
.wrap{position:relative;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:8px 24px 6px}
.title{width:100%;text-align:center;font-size:17px;font-weight:700;color:#4a4035;letter-spacing:1.5px;padding-top:10px;flex-shrink:0;
  border-bottom:1px solid rgba(196,154,108,0.25);padding-bottom:8px;margin-bottom:4px}
#chart{width:100%;height:320px;flex:1}
.subtitle{width:100%;text-align:center;font-size:11px;color:#9a8f82;padding-top:6px;flex-shrink:0;
  border-top:1px solid rgba(196,154,108,0.2);padding-bottom:4px}

@keyframes fadeInDown{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.96)}to{opacity:1;transform:scale(1)}}
.title{animation:fadeInDown 0.8s ease-out}
.subtitle{animation:fadeInUp 0.8s ease-out 0.4s both}
#chart{animation:scaleIn 1s ease-out 0.2s both}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">侨汇用途分配</div>
  <div id="chart"></div>
  <div class="subtitle">赡养45%为最核心，修房20%+教育15%　来源：侨汇用途调查</div>
</div>
<script>
(function(){
  function init(){
    var dom = document.getElementById('chart');
    if(!dom || typeof echarts === 'undefined'){
      setTimeout(init, 100);
      return;
    }
    var h = dom.offsetHeight || 320;
    var w = dom.offsetWidth || 600;
    var chart = echarts.init(dom, null, {width: w, height: h});
    chart.setOption({
animation:true,
animationDuration:2200,
animationDurationUpdate:900,
animationEasing:'cubicOut',
animationEasingUpdate:'cubicInOut',
animationDelay:function(idx){return idx*120;},
animationDelayUpdate:function(idx){return idx*60;},

  tooltip:{trigger:'item',formatter:function(p){return p.name+'<br/>占比：'+p.value+'%<br/>'+p.data.desc;}},
  series:[{
    type:'pie',
      animationDelay:function(idx){return idx*200;},animationEasing:'expOut',animationDuration:1600,radius:['15%','72%'],roseType:'area',
    data:[
      {value:45,name:'赡养家属',desc:'家用开支、供养父母妻儿',itemStyle:{color:'#c49a6c'}},
      {value:20,name:'修建房屋',desc:'红砖厝、祠堂',itemStyle:{color:'#6a9bd8'}},
      {value:15,name:'兴办教育',desc:'私塾→新学→大学',itemStyle:{color:'#7cb88a'}},
      {value:10,name:'基建公益',desc:'公路、医院、水利',itemStyle:{color:'#d4a5a5'}},
      {value:8,name:'救国捐资',desc:'认购公债、军需',itemStyle:{color:'#9e8cb8'}},
      {value:2,name:'投资兴业',desc:'侨资企业',itemStyle:{color:'#e6b563'}}
    ],
    label:{color:'#5c5248',fontSize:10,formatter:function(p){return p.name+'\n'+p.value+'%';}},
    labelLine:{lineStyle:{color:'#d8d0c4'}},
    itemStyle:{borderColor:'#f8f4e6',borderWidth:3},
    emphasis:{scaleSize:12,shadowColor:'rgba(0,0,0,0.12)',shadowBlur:10}
  }]

    });
    setTimeout(function(){chart.resize();}, 200);
    window.addEventListener('resize',function(){chart.resize();});
  }
  if(document.readyState === 'complete'){init();} else {window.addEventListener('load', init);}
  setTimeout(init, 500);
})();
</script>
</body>
</html>
